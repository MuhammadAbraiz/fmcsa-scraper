<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}FMCSA Lead Manager{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% if g.user %}
    <nav class="navbar">
        <div>
            {% if g.user.role == 'admin' %}
                <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
                <a href="{{ url_for('admin.agents') }}">Agents</a>
                <a href="{{ url_for('admin.calls') }}">Call Log</a>
                <a href="{{ url_for('admin.list_files') }}">Legacy CSVs</a>
            {% endif %}
            <a href="{{ url_for('agent.portal') }}">Search Portal</a>
        </div>
        <div>
            <span class="nav-user">{{ g.user.username }} ({{ g.user.role }})</span>
            <a href="{{ url_for('auth.change_password') }}">Change Password</a>
            <a href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
    </nav>
    {% endif %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
