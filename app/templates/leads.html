{% extends 'base.html' %}
{% block title %}All Leads{% endblock %}
{% block content %}
<div class="card">
    <h1>All Leads</h1>
    <p style="text-align:center;">The full shared lead pool. Filter by name/USDOT/MC, equipment guess, or an MC number range.</p>

    <div class="filter-bar">
        <div class="filter-field">
            <label for="f-q">Search</label>
            <input type="text" id="f-q" placeholder="Name, USDOT, MC...">
        </div>
        <div class="filter-field">
            <label for="f-equipment">Likely Equipment</label>
            <select id="f-equipment">
                <option value="">All</option>
                {% for eq in equipment_filters %}
                <option value="{{ eq }}">{{ eq }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="filter-field">
            <label for="f-mc-min">MC From</label>
            <input type="number" id="f-mc-min" class="filter-mc">
        </div>
        <div class="filter-field">
            <label for="f-mc-max">MC To</label>
            <input type="number" id="f-mc-max" class="filter-mc">
        </div>
        <div class="filter-field">
            <button type="button" id="apply-filters-btn">Apply</button>
        </div>
        <div class="filter-field">
            <button type="button" id="clear-filters-btn" class="btn-secondary">Clear</button>
        </div>
    </div>

    <div id="leads-empty" class="table-empty" style="display:none;">No leads match these filters.</div>
    <table id="leads-table" style="display:none;">
        <thead>
            <tr><th>Legal Name</th><th>MC</th><th>Phone</th><th>Equipment</th><th></th></tr>
        </thead>
        <tbody id="leads-tbody"></tbody>
    </table>

    <div class="pagination" id="pagination" style="display:none;">
        <div class="pagination-info" id="pagination-info"></div>
        <div class="pagination-controls">
            <button type="button" id="prev-page-btn" class="btn-secondary btn-small">Previous</button>
            <button type="button" id="next-page-btn" class="btn-secondary btn-small">Next</button>
        </div>
    </div>
</div>

{% include '_lead_drawer.html' %}

<script>
    const leadsTbody = document.getElementById('leads-tbody');
    const leadsTable = document.getElementById('leads-table');
    const leadsEmpty = document.getElementById('leads-empty');
    const paginationEl = document.getElementById('pagination');
    const paginationInfo = document.getElementById('pagination-info');
    let currentPage = 1;

    function leadRowHtml(lead) {
        const phone = lead.phone || '';
        const safePhone = escapeHtml(phone);
        const calledClass = lead.been_called ? ' called' : '';
        return `
            <tr>
                <td>${escapeHtml(lead.legal_name)}</td>
                <td>${escapeHtml(lead.mc_number)}</td>
                <td>${safePhone}</td>
                <td>${escapeHtml(lead.likely_equipment)}</td>
                <td>
                    <div class="row-actions">
                        ${phone ? `<a href="tel:${safePhone}" class="icon-btn icon-call${calledClass}" title="Call" onclick="markCalled(this, ${lead.id})">${window.leadIconSvg('call')}</a>` : ''}
                        <button type="button" class="icon-btn icon-details" title="Details" onclick="openLeadDrawer(${lead.id})">${window.leadIconSvg('details')}</button>
                    </div>
                </td>
            </tr>`;
    }

    window.markCalled = function(el, leadId) {
        el.classList.add('called');
        fetch(`/leads/${leadId}/call`, { method: 'POST' }).catch(() => {});
    };

    async function loadLeads(page) {
        currentPage = page || 1;
        const params = new URLSearchParams();
        const q = document.getElementById('f-q').value.trim();
        const equipment = document.getElementById('f-equipment').value;
        const mcMin = document.getElementById('f-mc-min').value;
        const mcMax = document.getElementById('f-mc-max').value;
        if (q) params.set('q', q);
        if (equipment) params.set('equipment', equipment);
        if (mcMin) params.set('mc_min', mcMin);
        if (mcMax) params.set('mc_max', mcMax);
        params.set('page', currentPage);

        try {
            const res = await fetch(`/api/leads?${params.toString()}`);
            const data = await res.json();
            if (!data.leads.length) {
                leadsTable.style.display = 'none';
                leadsEmpty.style.display = 'block';
                paginationEl.style.display = 'none';
                return;
            }
            leadsTbody.innerHTML = data.leads.map(leadRowHtml).join('');
            leadsTable.style.display = 'table';
            leadsEmpty.style.display = 'none';
            renderPagination(data);
        } catch (err) {
            leadsEmpty.textContent = 'Could not load leads.';
            leadsEmpty.style.display = 'block';
            leadsTable.style.display = 'none';
            paginationEl.style.display = 'none';
        }
    }

    function renderPagination(data) {
        const start = (data.page - 1) * data.page_size + 1;
        const end = Math.min(data.page * data.page_size, data.total);
        paginationInfo.textContent = `Showing ${start}–${end} of ${data.total}`;
        document.getElementById('prev-page-btn').disabled = data.page <= 1;
        document.getElementById('next-page-btn').disabled = end >= data.total;
        paginationEl.style.display = 'flex';
    }

    document.getElementById('apply-filters-btn').addEventListener('click', () => loadLeads(1));
    document.getElementById('clear-filters-btn').addEventListener('click', () => {
        document.getElementById('f-q').value = '';
        document.getElementById('f-equipment').value = '';
        document.getElementById('f-mc-min').value = '';
        document.getElementById('f-mc-max').value = '';
        loadLeads(1);
    });
    document.getElementById('f-q').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadLeads(1); });
    document.getElementById('prev-page-btn').addEventListener('click', () => loadLeads(currentPage - 1));
    document.getElementById('next-page-btn').addEventListener('click', () => loadLeads(currentPage + 1));

    loadLeads(1);
</script>
{% endblock %}
